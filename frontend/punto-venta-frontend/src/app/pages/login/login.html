<div class="auth-page">
  <section class="auth-hero">
    <div class="brand-badge">POS</div>
    <h1>MiniMarket Online</h1>
    <p>Gestiona tus compras, productos y usuarios de forma rápida y segura.</p>
  </section>

  <section class="auth-card">
    <h2>Inicio de sesión</h2>
    <p class="subtitle">Ingresa tus datos para continuar</p>

    <form (ngSubmit)="login()">
      <label>Correo electrónico</label>
      <input
        type="email"
        placeholder="Ingresa tu correo"
        name="email"
        [(ngModel)]="email">

      <label>Contraseña</label>
      <input
        type="password"
        placeholder="Ingresa tu contraseña"
        name="password"
        [(ngModel)]="password">

      <button class="primary-btn" type="submit">
        Iniciar Sesión
      </button>

      <button class="secondary-btn" type="button" (click)="irARegistro()">
        Crear cuenta
      </button>

      <p class="success">{{ mensaje }}</p>
      <p class="error">{{ error }}</p>
    </form>
  </section>
</div>
