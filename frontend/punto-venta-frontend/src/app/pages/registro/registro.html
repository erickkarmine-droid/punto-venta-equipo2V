<div class="registro-container">
  <div class="registro-card">

    <h1>Registro de Cliente</h1>

    <form (ngSubmit)="registrar()">

      <input
        type="text"
        placeholder="Nombre"
        name="nombre"
        [(ngModel)]="nombre">

      <input
        type="text"
        placeholder="Apellido paterno"
        name="apellidoPaterno"
        [(ngModel)]="apellidoPaterno">

      <input
        type="text"
        placeholder="Apellido materno"
        name="apellidoMaterno"
        [(ngModel)]="apellidoMaterno">

      <input
        type="email"
        placeholder="Correo electrónico"
        name="email"
        [(ngModel)]="email">

      <input
        type="password"
        placeholder="Contraseña"
        name="password"
        [(ngModel)]="password">

      <input
        type="text"
        placeholder="Teléfono (10 dígitos)"
        name="telefono"
        [(ngModel)]="telefono">

      <button type="submit">
        Registrarse
      </button>

      <button
        type="button"
        (click)="irALogin()">
        Regresar
      </button>

      <p class="success">
        {{ mensaje }}
      </p>

      <p class="error">
        {{ error }}
      </p>

    </form>

  </div>
</div>
